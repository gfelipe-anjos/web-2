<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jogo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="jogo()">
    <div>
        <div  class="pause" id="pause">GAME PAUSED</div>
        <div class="temporizador" >
            <div class="tempo">
                <img src="/img/clock.png" alt="">
                <span id="tempo"></span>
            </div>
            <div>
                <img src="/img/nave.png" alt="">
                <p>LIFE:</p>
            </div>
            <div>
                <img src="/img/alien.png" alt="">
                <p>ALIENS:</p>
            </div>
        </div>
        <div class="movimentacao" id="movimentacao">
            <img src="/img/missil.png"  class="missil1" id="missil1" alt="">
            <img src="/img/nave.png" class="nave" alt="">
            <img src="/img/missil.png"  class="missil2" id="missil2" alt="">
        </div>
    </div>
</body>
<script src="./js/script.js"></script>
</html>
